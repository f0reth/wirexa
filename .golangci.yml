version: "2"

issues:
  # 同一内容のIssue最大数
  max-same-issues: 50

# -----------------------------
# Formatter
# -----------------------------
formatters:
  enable:
    # gofmtの厳格版
    - gofumpt

    # import整理
    - goimports

  settings:
    gofumpt:
      # gofumpt追加ルール
      extra-rules: true

    goimports:
      # 自分のmodule
      local-prefixes:
        - github.com/f0reth/Wirexa

# -----------------------------
# Linters
# -----------------------------
linters:
  enable:
    # ---------- Go公式 ----------
    - govet

    # ---------- 最重要 ----------
    - staticcheck
    - errcheck
    - ineffassign
    - unused

    # ---------- error処理 ----------
    - errorlint
    - nilerr
    - nilnil

    # ---------- セキュリティ ----------
    - gosec

    # ---------- IO ----------
    - bodyclose

    # ---------- コード品質 ----------
    - revive
    - gocritic
    - goconst
    - misspell

    # ---------- モダンGo ----------
    - modernize
    - copyloopvar

    # ---------- 最適化 ----------
    - perfsprint
    - unconvert

    # ---------- lint管理 ----------
    - nolintlint

    # ---------- その他 ----------
    - whitespace

  settings:
    errcheck:
      # 型アサーションもチェック
      check-type-assertions: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008

    perfsprint:
      strconcat: false

    nolintlint:
      require-explanation: true
      require-specific: true

  # -----------------------------
  # Exclusions
  # -----------------------------
  exclusions:
    warn-unused: true

    presets:
      - std-error-handling
      - common-false-positives

    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck

      # Http/Udp は Go 慣習（HTTP/UDP）と異なるが Wails バインディングの都合で統一
      - linters:
          - revive
        text: "var-naming: type Http"

      - linters:
          - revive
        text: "var-naming: type Udp"

      - linters:
          - revive
        text: "var-naming: func.*Udp"

      - linters:
          - staticcheck
        text: "ST1003: type Http"

      - linters:
          - staticcheck
        text: "ST1003: type Udp"

      - linters:
          - staticcheck
        text: "ST1003: func.*Udp"
