name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: mkdir -p frontend/dist
      - run: touch frontend/dist/index.html

      - run: go test ./...

  test-go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: mkdir -p frontend/dist
      - run: touch frontend/dist/index.html

      - run: go test -tags integration -v ./internal/integration/...

  test-frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: frontend

      - run: bun run tsc
        working-directory: frontend

      - run: bun run test
        working-directory: frontend

  bindings-fresh:
    name: Wails Bindings Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Wails のバージョンは go.mod と一致させる（再生成結果のブレを防ぐ）。
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - run: mkdir -p frontend/dist
      - run: touch frontend/dist/index.html

      # Go 構造体を変更したのにバインディングを再生成し忘れていれば差分が出て落ちる。
      - run: wails generate module

      - name: Fail if generated bindings are stale
        run: git diff --exit-code frontend/wailsjs
